<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AI手机</title>
    
    <!-- CSS文件引入 -->
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/lockscreen.css">
    <link rel="stylesheet" href="css/desktop.css">
    <link rel="stylesheet" href="css/page1.css">
    <link rel="stylesheet" href="css/page2.css">
    <link rel="stylesheet" href="css/page3.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    
    <!-- 应用容器 -->
    <div class="app-container" id="appContainer">
        
        <!-- 手机外壳 -->
        <div class="phone-frame" id="phoneFrame">
            
            <!-- 顶部状态栏（所有页面共用） -->
            <div class="status-bar" id="statusBar">
                <div class="status-left">
                    <span class="status-time" id="statusTime">10:30</span>
                </div>
                <div class="status-right">
                    <button class="frame-toggle-btn" id="frameToggleBtn" title="切换边框">⬜</button>
                    <span class="status-signal" id="statusSignal">📵</span>
                    <span class="status-battery" id="statusBattery">🔋85%</span>
                </div>
            </div>

            <!-- 锁屏界面 -->
            <div class="lockscreen" id="lockscreen">
                <div class="lockscreen-content">
                    <div class="lockscreen-time" id="lockscreenTime">10:30</div>
                    <div class="lockscreen-date" id="lockscreenDate">12月31日 星期三</div>
                    <button class="unlock-button" id="unlockButton">
                        <span class="unlock-icon">⬆️</span>
                        <span class="unlock-text">点击解锁</span>
                    </button>
                </div>
            </div>

            <!-- 桌面容器 -->
            <div class="desktop-container" id="desktopContainer">
                
                <!-- 桌面页面包装器（用于左右滑动） -->
                <div class="desktop-pages" id="desktopPages">
                    
                    <!-- 桌面第1页 -->
                    <div class="desktop-page page-1">
                        <!-- 顶部时间日期 -->
                        <div class="page1-header">
                            <div class="page1-time" id="page1Time">10:30</div>
                            <div class="page1-date" id="page1Date">12月31日 星期三</div>
                        </div>

                        <!-- 内容区域 -->
                        <div class="page1-content-area">
                            <!-- 唱片播放器（左侧） -->
                            <div class="music-player">
                                <div class="music-disc">
                                    <div class="disc-content">🎵</div>
                                </div>
                                <div class="music-info">音乐播放器</div>
                            </div>

                            <!-- APP图标组（右侧） -->
                            <div class="app-grid-1">
                                <!-- 主题 -->
                                <div class="app-icon" data-en="Shell" data-zh="壳">
                                    <div class="icon-img">
                                        <img src="assets/icons/1767251756996.png" alt="主题">
                                    </div>
                                    <div class="icon-label">
                                        <span class="label-text">Shell</span>
                                    </div>
                                </div>
                                
                                <!-- 世界书 -->
                                <div class="app-icon" data-en="Epoch" data-zh="纪元">
                                    <div class="icon-img">
                                        <img src="assets/icons/1767252648051.png" alt="世界书">
                                    </div>
                                    <div class="icon-label">
                                        <span class="label-text">Epoch</span>
                                    </div>
                                </div>
                                
                                <!-- 天气 -->
                                <div class="app-icon" data-en="Atmosphere" data-zh="气象">
                                    <div class="icon-img">
                                        <img src="assets/icons/1767251624535.png" alt="天气">
                                    </div>
                                    <div class="icon-label">
                                        <span class="label-text">Atmosphere</span>
                                    </div>
                                </div>
                                
                                <!-- 设置 -->
<div class="app-icon" data-en="Core" data-zh="中枢" onclick="openCoreApp()">
    <div class="icon-img">
        <img src="assets/icons/1767252711494.png" alt="设置">
    </div>
    <div class="icon-label">
        <span class="label-text">Core</span>
    </div>
</div>
                            </div>
                        </div>
                    </div>

                    <!-- 桌面第2页 -->
                    <div class="desktop-page page-2">
                        <!-- 顶部自定义区域 -->
<div class="page2-custom-header">
    <!-- 第一行：左文字+横杠 + 右圆圈图片 -->
    <div class="custom-row row-1">
        <div class="text-with-line">
            <span class="custom-text">突破次元遇见你</span>
            <div class="bar-container">
                <div class="bar-html">━━━━━━━━━━━━</div>
                <div class="bar-css"></div>
            </div>
        </div>
        <div class="custom-circle circle-right">
            <!-- 图片通过CSS背景显示 -->
        </div>
    </div>
    
    <!-- 第二行：左圆圈图片 + 右文字+横杠 -->
    <div class="custom-row row-2">
        <div class="custom-circle circle-left">
            <!-- 图片通过CSS背景显示 -->
        </div>
        <div class="text-with-line">
            <span class="custom-text">跨越次元爱上你</span>
            <div class="bar-container">
                <div class="bar-html">━━━━━━━━━━━━</div>
                <div class="bar-css"></div>
            </div>
        </div>
    </div>
</div>
                        <!-- 波浪分割线 -->
                        <div class="wave-divider">
                            <svg viewBox="0 0 1200 20" xmlns="http://www.w3.org/2000/svg">
                                <path d="M0,10 Q30,0 60,10 T120,10 T180,10 T240,10 T300,10 T360,10 T420,10 T480,10 T540,10 T600,10 T660,10 T720,10 T780,10 T840,10 T900,10 T960,10 T1020,10 T1080,10 T1140,10 T1200,10" 
                                      fill="none" 
                                      stroke="rgba(0,0,0,0.1)" 
                                      stroke-width="2"/>
                            </svg>
                        </div>

                        <!-- 主要内容区域 -->
                        <div class="page2-content">
                            <!-- 左侧竖长图片组件 -->
                            <div class="widget-image large"></div>

                            <!-- 右上角APP（聊天、记事录） -->
                            <div class="app-grid-2">
                                <!-- 聊天 -->
<div class="app-icon" data-en="Node" data-zh="节点" onclick="openChatApp()">
    <div class="icon-img">
        <img src="assets/icons/1767251668634.png" alt="聊天">
    </div>
    <div class="icon-label">
        <span class="label-text">Node</span>
    </div>
</div>
                                
                                <!-- 记事录 -->
                                <div class="app-icon" data-en="Trace" data-zh="刻痕">
                                    <div class="icon-img">
                                        <img src="assets/icons/1767253673116.png" alt="记事录">
                                    </div>
                                    <div class="icon-label">
                                        <span class="label-text">Trace</span>
                                    </div>
                                </div>
                            </div>

                            <!-- 右侧APP（音乐、短信）- 在聊天记事录下面 -->
                            <div class="app-grid-2-bottom">
                                <!-- 音乐 -->
                                <div class="app-icon" data-en="Frequency" data-zh="频率">
                                    <div class="icon-img">
                                        <img src="assets/icons/1767250659853.png" alt="音乐">
                                    </div>
                                    <div class="icon-label">
                                        <span class="label-text">Frequency</span>
                                    </div>
                                </div>
                                
                                <!-- 短信 -->
                                <div class="app-icon" data-en="Echo" data-zh="回声">
                                    <div class="icon-img">
                                        <img src="assets/icons/1767250730396.png" alt="短信">
                                    </div>
                                    <div class="icon-label">
                                        <span class="label-text">Echo</span>
                                    </div>
                                </div>
                            </div>

                            <!-- 底部横向图片组件 -->
                            <div class="widget-image small"></div>
                        </div>
                    </div>

                    <!-- 桌面第3页 -->
                    <!-- ============ 桌面第3页 · v3 · 替换原有 .page-3 内容 ============ -->

<div class="desktop-page page-3">

    <!-- 顶部文案分割线（随机刷新） -->
    <div class="p3-quote-divider">
        <span class="p3-quote-text">跨越次元遇见你</span>
    </div>

    <!-- 长条主卡片（可换背景图+随机文案） -->
    <div class="p3-main-card">
        <div class="p3-main-card-bg"></div>
        <div class="p3-main-card-overlay"></div>
        <div class="p3-main-card-content">
            <div class="p3-main-card-quote">今天也是想你的一天</div>
            <div class="p3-main-card-sub">TAP TO EXPLORE</div>
        </div>
    </div>

    <!-- 双卡片行 -->
    <div class="p3-cards-row">
        <!-- 左：日历卡片 -->
        <div class="p3-square-card p3-calendar-card">
            <div class="p3-cal-header">
                <span class="p3-cal-month">4月</span>
                <span class="p3-cal-year">2026</span>
            </div>
            <div class="p3-cal-day">26</div>
            <div class="p3-cal-weekday">星期六</div>
            <div class="p3-cal-dot"></div>
        </div>

        <!-- 右：纪念日卡片 -->
        <div class="p3-square-card p3-memorial-card">
            <div class="p3-mem-label"><span class="p3-mem-icon">💕</span>纪念日</div>
            <div class="p3-mem-days-wrap">
                <span class="p3-mem-days-number">365</span>
                <span class="p3-mem-days-unit">DAYS</span>
            </div>
            <div class="p3-mem-name">在一起</div>
            <div class="p3-mem-date">始于 2025-01-01</div>
        </div>
    </div>

    <!-- 底部淡分割线 -->
    <div class="p3-bottom-divider"></div>

    <!-- 下方留空，以后放APP -->

</div>

                </div>

                <!-- 翻页指示点 -->
                <div class="page-indicators" id="pageIndicators">
                    <span class="indicator active"></span>
                    <span class="indicator"></span>
                    <span class="indicator"></span>
                </div>

            </div>

        </div>

    </div>

<!-- 编辑弹窗 -->
    <div class="edit-modal" id="editModal">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">编辑文字</h3>
            </div>
            <div class="modal-body">
                <input type="text" class="modal-input" id="modalInput" placeholder="请输入内容">
            </div>
            <div class="modal-footer">
                <button class="modal-btn btn-cancel" id="modalCancel">取消</button>
                <button class="modal-btn btn-confirm" id="modalConfirm">确定</button>
            </div>
        </div>
    </div>

    <!-- JavaScript文件引入 -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/statusbar.js"></script>
    <script src="js/lockscreen.js"></script>
    <script src="js/desktop.js"></script>
    <script src="js/frame-toggle.js"></script>
    <script src="js/language-toggle.js"></script>
    <script src="js/text-editor.js"></script>  <!-- ← 这行很重要！ -->
        <script src="js/image-editor.js"></script>  <!-- ← 加这行 -->
        <script src="js/page3.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
